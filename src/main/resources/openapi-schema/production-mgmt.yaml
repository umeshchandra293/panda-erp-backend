openapi: 3.0.3
info:
  title: Production Management API
  version: 1.0.0

servers:
  - url: http://localhost:8080/api

tags:
  - name: Production
  - name: FGStock

paths:

  /production/shifts:
    get:
      tags: [Production]
      operationId: getShifts
      parameters:
        - name: fromDate
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductionShift'
    post:
      tags: [Production]
      operationId: createShift
      summary: >
        Create a shift entry — auto-deducts raw materials via BOM
        and updates finished goods stock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductionShiftRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductionShift'

  /production/fg-stock:
    get:
      tags: [FGStock]
      operationId: getFgStock
      summary: Current finished goods stock levels per product
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FgStockItem'

components:
  schemas:

    BatchEntry:
      type: object
      required: [productId, actualQty]
      properties:
        productId:
          type: string
        plannedQty:
          type: number
          format: double
        actualQty:
          type: number
          format: double
        rejectedQty:
          type: number
          format: double
        notes:
          type: string

    ProductionShiftRequest:
      type: object
      required: [shiftType, batches]
      properties:
        shiftDate:
          type: string
          format: date
        shiftType:
          type: string
          enum: [MORNING, EVENING, NIGHT]
        operatorName:
          type: string
        notes:
          type: string
        batches:
          type: array
          items:
            $ref: '#/components/schemas/BatchEntry'

    ProductionBatch:
      type: object
      properties:
        batchId:
          type: string
          readOnly: true
        shiftId:
          type: string
          readOnly: true
        productId:
          type: string
        productName:
          type: string
          readOnly: true
        plannedQty:
          type: number
          format: double
        actualQty:
          type: number
          format: double
        rejectedQty:
          type: number
          format: double
        notes:
          type: string

    ProductionShift:
      type: object
      properties:
        shiftId:
          type: string
          readOnly: true
        shiftDate:
          type: string
          format: date
        shiftType:
          type: string
          enum: [MORNING, EVENING, NIGHT]
        operatorName:
          type: string
        notes:
          type: string
        status:
          type: string
        totalUnitsProduced:
          type: number
          format: double
          readOnly: true
        batches:
          type: array
          items:
            $ref: '#/components/schemas/ProductionBatch'

    FgStockItem:
      type: object
      properties:
        fgId:
          type: string
        productId:
          type: string
        productName:
          type: string
          readOnly: true
        sku:
          type: string
          readOnly: true
        quantity:
          type: number
          format: double
        unit:
          type: string
          readOnly: true