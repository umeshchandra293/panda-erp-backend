openapi: 3.0.0
info:
  title: Company Management API
  version: 1.0.0
  description: Full CRUD operations for company records.

paths:
  /companies:
    post:
      tags: [Company]
      summary: Create a new company
      operationId: createCompany
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Company'
      responses:
        '201':
          description: Company created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'

    get:
      tags: [Company]
      summary: List all companies
      operationId: getAllCompanies
      description: Retrieve paginated list of companies
      responses:
        '200':
          description: A list of companies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'

  /companies/{company_id}:
    parameters:
      - name: company_id
        in: path
        required: true
        description: The ID of the company to act upon
        schema:
          type: string

    get:
      tags: [Company]
      summary: Get company by ID
      operationId: getCompanyById
      responses:
        '200':
          description: Company details found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
        '404':
          description: Company not found

    put:
      tags: [Company]
      summary: Update an existing company
      operationId: updateCompany
      description: Update an existing company record by its ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Company'
      responses:
        '200':
          description: Company updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
        '404':
          description: Company not found
          
    delete:
      tags: [Company]
      summary: Delete a company
      operationId: deleteCompany
      responses:
        '204':
          description: Company deleted successfully (No Content)
        '404':
          description: Company not found

  /departments:
      post:
        tags: [Department]
        summary: Create a new department
        operationId: createDepartment
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
        responses:
          '201':
            description: Department created successfully
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Department'
      get:
        tags: [Department]
        summary: List all departments
        operationId: getAllDepartments
        responses:
          '200':
            description: A list of departments
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Department'

  /departments/{department_id}:
    parameters:
      - name: department_id
        in: path
        required: true
        description: The unique ID of the department
        schema:
          type: string

    get:
      summary: Get department details
      operationId: getDepartmentById
      tags: [Department]
      responses:
        '200':
          description: Department details found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
        '404':
          description: Department not found

    put:
      tags: [Department]
      summary: Update a department
      operationId: updateDepartment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Department'
      responses:
        '200':
          description: Department updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
        '404':
          description: Department not found

    delete:
      tags: [Department]
      summary: Delete a department
      operationId: deleteDepartment
      responses:
        '204':
          description: Department deleted successfully
        '404':
          description: Department not found

  /employees:
    post:
      tags: [Employee]
      summary: Create a new employee
      operationId: createEmployee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Employee'
      responses:
        '201':
          description: Employee created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'

    get:
      tags: [Employee]
      summary: List all employees
      operationId: getAllEmployees
      description: Retrieve paginated list of employees
      responses:
        '200':
          description: A list of employees
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'

  /employees/{employee_id}:
    parameters:
      - name: employee_id
        in: path
        required: true
        schema:
          type: string

    get:
      tags: [Employee]
      summary: Get employee details
      operationId: getEmployeeById
      responses:
        '200':
          description: Employee found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '404':
          description: Employee not found

    put:
      tags: [Employee]
      summary: Update employee record
      operationId: updateEmployee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Employee'
      responses:
        '200':
          description: Employee updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '404':
          description: Employee not found

    delete:
      tags: [Employee]
      summary: Delete employee record
      operationId: deleteEmployee
      responses:
        '204':
          description: Employee deleted successfully
        '404':
          description: Employee not found

components:
  schemas:
    Company:
      type: object
      required:
        - company_id
        - name
        - email_id
      properties:
        company_id:
          type: string
          example: "001"
        name:
          type: string
          example: "ABC Company"
        legal_name:
          type: string
          example: "ABC Company"
        tax_id:
          type: string
          example: "tx001199"
        email_id:
          type: string
          format: email
          example: "test@gmail.com"
        phone:
          type: string
          example: "845-235-7680"
        website:
          type: string
          example: "www.abccompany.com"
        address:
          type: string
          example: "123 Main Street, Boston, MA-08709"

    Department:
      type: object
      required:
        - department_id
        - company_id
        - name
        - code
      properties:
        department_id:
          type: string
          description: Unique identifier for the department.
          example: "010"
        company_id:
          type: string
          description: The ID of the company this department belongs to.
          example: "001"
        name:
          type: string
          description: Human-readable name of the department.
          example: "Sales Department"
        code:
          type: string
          description: Short code representing the department.
          example: "SAl01"
        parent_dept_id:
          type: string
          description: The ID of the parent department (for sub-departments).
          example: "011"
    Employee:
      type: object
      required:
        - employee_id
        - company_id
        - first_name
        - last_name
        - email
        - status
      properties:
        employee_id:
          type: string
          example: "0111"
        company_id:
          type: string
          example: "001"
        department_id:
          type: string
          example: "010"
        employee_code:
          type: string
          example: "emp01"
        first_name:
          type: string
          example: "David"
        last_name:
          type: string
          example: "Warner"
        email:
          type: string
          format: email
          example: "davidw@gmail.com"
        phone:
          type: string
          example: "1234567890"
        job_title:
          type: string
          example: "Manager"
        manager_id:
          type: string
          example: "01112"
        hire_date:
          type: string
          format: date
          example: "2020-01-01"
          description: Date format should be YYYY-MM-DD for standard API compatibility.
        termination_date:
          type: string
          format: date
          example: "9999-12-31"
        status:
          type: string
          example: "Active"