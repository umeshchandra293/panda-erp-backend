openapi: 3.0.3
info:
  title: Raw Material Management API
  description: REST API for Raw Material Management System
  version: 1.0.0
  contact:
    name: HS Material Management Team
servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: MaterialMgmt
    description: Material management master data
paths:
  /rawmaterial:
    get:
      tags: [RawMaterial]
      operationId: getAllMaterials
      summary: List all raw materials
      description: Retrieve paginated list of raw materials
      parameters:
        - name: category
          in: query
          schema:
            type: integer
            format: int32
        - name: isActive
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            format: int32
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            format: int32
            default: 20
        - name: sort
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved materials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RawMaterial'
    post:
      tags: [RawMaterial]
      operationId: createMaterial
      summary: Create a new raw material
      description: Create a new raw material record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RawMaterial'
      responses:
        '201':
          description: Material created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RawMaterial'
        '400':
          description: Invalid input

  /rawmaterial/{id}:
    get:
      tags: [RawMaterial]
      operationId: getMaterialById
      summary: Get raw material by ID
      description: Retrieve a specific raw material by its ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Material found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RawMaterial'
        '404':
          description: Material not found
    put:
      tags: [RawMaterial]
      operationId: updateMaterial
      summary: Update raw material
      description: Update an existing raw material
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RawMaterial'
      responses:
        '200':
          description: Material updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RawMaterial'
        '404':
          description: Material not found
    delete:
      tags: [RawMaterial]
      operationId: deleteMaterial
      summary: Delete raw material
      description: Delete a raw material by its ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Material deleted successfully
        '404':
          description: Material not found

components:
  schemas:
    RawMaterial:
      type: object
      required:
        - name
        - categoryId
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 500
        categoryId:
          type: integer
          format: int32
        unitOfMeasure:
          type: string
          enum: [KG, LITER, PIECE, METER]
        minimumStockLevel:
          type: number
          format: float
          minimum: 0
        maximumStockLevel:
          type: number
          format: float
          minimum: 0
        reorderPoint:
          type: number
          format: float
          minimum: 0
        isActive:
          type: boolean
          default: true

    PageRawMaterial:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/RawMaterial'
        pageable:
          type: object
          properties:
            pageNumber:
              type: integer
            pageSize:
              type: integer
            sort:
              type: object
            offset:
              type: integer
            paged:
              type: boolean
            unpaged:
              type: boolean
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        last:
          type: boolean
        first:
          type: boolean
        numberOfElements:
          type: integer
        size:
          type: integer
        sort:
          type: object
        empty:
          type: boolean
