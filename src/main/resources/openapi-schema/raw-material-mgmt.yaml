openapi: 3.0.3
info:
  title: Raw Material Management API
  description: REST API for Raw Material Management System
  version: 2.0.0
  contact:
    name: HS Material Management Team
servers:
  - url: http://localhost:8080/api
    description: Local development server

tags:
  - name: RawMaterial
    description: Raw material master data

paths:
  /rawmaterial:
    get:
      tags: [RawMaterial]
      operationId: getAllMaterials
      summary: List all raw materials
      parameters:
        - name: category
          in: query
          required: false
          schema: { type: string }
        - name: isActive
          in: query
          required: false
          schema: { type: boolean }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/RawMaterial' }
        '500':
          description: Internal Server Error

    post:
      tags: [RawMaterial]
      operationId: createMaterial
      summary: Create a new raw material
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RawMaterial' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RawMaterial' }
        '400':
          description: Invalid input

  /rawmaterial/{materialId}:
    parameters:
      - name: materialId
        in: path
        required: true
        schema:
          type: string
          maxLength: 40
    get:
      tags: [RawMaterial]
      operationId: getMaterialById
      summary: Get raw material by ID
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RawMaterial' }
        '404':
          description: Not found
    put:
      tags: [RawMaterial]
      operationId: updateMaterial
      summary: Update raw material
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RawMaterial' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RawMaterial' }
        '404':
          description: Not found
    delete:
      tags: [RawMaterial]
      operationId: deleteMaterial
      summary: Delete raw material
      responses:
        '204':
          description: No Content
        '404':
          description: Not found

components:
  schemas:
    RawMaterial:
      type: object
      required:
        - materialName
        - category
        - uom
      properties:
        materialId:
          type: string
          readOnly: true
          maxLength: 40
          description: Server-generated. Format MAT-NNNNNN.
          example: MAT-000001
        materialName:
          type: string
          maxLength: 255
          example: PET Preform 1L (18.8g)
        description:
          type: string
          maxLength: 500
        category:
          type: string
          enum: [PREFORMS, CHEMICALS, CAPS, LABELS, PACKAGING, OTHER]
          example: PREFORMS
        uom:
          type: string
          enum: [KG, GM, LTR, ML, PCS, BOX, BAG, ROLL, METER]
          example: KG
        hsnSacCode:
          type: string
          pattern: '^[0-9]{4,8}$'
          example: "28369990"
        reorderLevel:
          type: number
          format: double
          minimum: 0
          default: 0
        safetyStockLevel:
          type: number
          format: double
          minimum: 0
          default: 0
        unitPrice:
          type: number
          format: double
          minimum: 0
          default: 0
          description: Default purchase price per UOM unit (e.g. ₹ per KG)
          example: 85.50
        isActive:
          type: boolean
          default: true