openapi: 3.0.3
info:
  title: HS Common Schemas
  version: 1.0.0

components:
  schemas:

    Address:
      type: object
      required: [addressLine1, city, stateCode, postalCode, countryCode, addressType]
      properties:
        addressId:
          type: string
          maxLength: 40
          description: Server-generated on create; required on update to identify existing rows
        addressType:
          type: string
          enum: [REGISTERED, FACTORY, BILLING, SHIPPING]
          description: |
            REGISTERED = legal/registered office (per GST registration)
            FACTORY    = manufacturing site
            BILLING    = invoicing address
            SHIPPING   = goods despatch address
        addressLine1:
          type: string
          maxLength: 100
        addressLine2:
          type: string
          maxLength: 100
        poBoxNumber:
          type: string
          maxLength: 20
        city:
          type: string
          maxLength: 60
        stateCode:
          type: string
          maxLength: 40
          description: GST state code (e.g. "27" for Maharashtra, "36" for Telangana)
          example: "36"
        postalCode:
          type: string
          maxLength: 20
          example: "503206"
        countryCode:
          type: string
          maxLength: 20
          default: IN
          example: IN
        timeZone:
          type: string
          maxLength: 20
        isPrimary:
          type: boolean
          default: false

    Phone:
      type: object
      required: [phoneType, phoneNumber]
      properties:
        phoneId:
          type: string
          maxLength: 40
        phoneType:
          type: string
          maxLength: 10
          description: One of WORK, MOBILE, FAX, HOME (enforced by DB CHECK constraint)
          example: WORK
        phoneNumber:
          type: string
          maxLength: 20
          example: "+91 6305308696"
        phoneExtension:
          type: string
          maxLength: 6
        isPrimary:
          type: boolean
          default: false

    Email:
      type: object
      required: [email]
      properties:
        emailId:
          type: string
          maxLength: 40
        email:
          type: string
          format: email
          maxLength: 255
          example: pandawater17@gmail.com
        isPrimary:
          type: boolean
          default: false

    Problem:
      type: object
      description: RFC 7807-style error response
      required: [status, title]
      properties:
        type:
          type: string
          format: uri
          example: "about:blank"
        title:
          type: string
          example: "Validation Failed"
        status:
          type: integer
          format: int32
          example: 400
        detail:
          type: string
          example: "supplier.gstNumber must match GSTIN format"
        instance:
          type: string
          example: "/api/finance/suppliers"
        timestamp:
          type: string
          format: date-time
        errors:
          type: array
          description: Field-level validation errors (only present for 400)
          items:
            type: object
            properties:
              field:
                type: string
                example: "gstNumber"
              message:
                type: string
                example: "Invalid GSTIN format"
              rejectedValue:
                type: string