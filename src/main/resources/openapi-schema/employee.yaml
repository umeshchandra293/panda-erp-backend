openapi: 3.0.0
info:
  title: Employee Management API
  version: 1.0.0
  description: CRUD operations for managing employee records across companies and departments.

paths:
  /employees:
    post:
      summary: Create a new employee
      operationId: createEmployee
      tags:
        - Employees
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Employee'
      responses:
        '201':
          description: Employee created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'

    get:
      summary: List all employees
      operationId: listEmployees
      tags:
        - Employees
      parameters:
        - name: company_id
          in: query
          schema:
            type: string
          description: Filter employees by company
        - name: status
          in: query
          schema:
            type: string
            enum: [Active, Inactive, Terminated]
      responses:
        '200':
          description: A list of employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Employee'

  /employees/{employee_id}:
    parameters:
      - name: employee_id
        in: path
        required: true
        schema:
          type: string

    get:
      summary: Get employee details
      operationId: getEmployeeById
      tags:
        - Employees
      responses:
        '200':
          description: Employee found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '404':
          description: Employee not found

    put:
      summary: Update employee record
      operationId: updateEmployee
      tags:
        - Employees
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Employee'
      responses:
        '200':
          description: Employee updated successfully
        '404':
          description: Employee not found

    delete:
      summary: Delete employee record
      operationId: deleteEmployee
      tags:
        - Employees
      responses:
        '204':
          description: Employee deleted

components:
  schemas:
    Employee:
      type: object
      required:
        - employee_id
        - company_id
        - first_name
        - last_name
        - email
        - status
      properties:
        employee_id:
          type: string
          example: "0111"
        company_id:
          type: string
          example: "001"
        department_id:
          type: string
          example: "010"
        employee_code:
          type: string
          example: "emp01"
        first_name:
          type: string
          example: "David"
        last_name:
          type: string
          example: "Warner"
        email:
          type: string
          format: email
          example: "davidw@gmail.com"
        phone:
          type: string
          example: "1234567890"
        job_title:
          type: string
          example: "Manager"
        manager_id:
          type: string
          nullable: true
          example: "01112"
        hire_date:
          type: string
          format: date
          example: "2020-01-01"
          description: Date format should be YYYY-MM-DD for standard API compatibility.
        termination_date:
          type: string
          format: date
          example: "9999-12-31"
        status:
          type: string
          enum: [Active, Inactive, Terminated]
          example: "Active"