spring.application.name=parent

# ── Custom DB properties ──────────────────────────────────────────────────────
erp.finance.api.db.hostName=localhost
erp.finance.api.db.port=5432
erp.finance.api.db.databaseName=erp-system-db
erp.finance.api.db.schemaName=rm_material_schema
erp.finance.api.db.username=postgres
erp.finance.api.db.password=Umesh@293
erp.finance.api.db.connectionpoolInitialSize=10
erp.finance.api.db.connectionpoolMaxSize=20
erp.finance.api.db.connectionpoolMaxWaitTime=1000
erp.finance.api.db.connectionpoolMaxIdleTime=3000
erp.finance.api.db.connectionpoolMaxLifetime=18000

# ── Spring R2DBC connection (required for Spring Data R2DBC to connect) ───────
spring.r2dbc.url=r2dbc:postgresql://localhost:5432/erp-system-db?currentSchema=rm_material_schema
spring.r2dbc.username=postgres
spring.r2dbc.password=Umesh@293
spring.r2dbc.pool.initial-size=10
spring.r2dbc.pool.max-size=20
spring.r2dbc.pool.max-idle-time=3000ms
spring.r2dbc.pool.max-life-time=18000ms

# ── Error handling ────────────────────────────────────────────────────────────
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.hst.erp=DEBUG
logging.level.org.springframework.r2dbc=DEBUG
