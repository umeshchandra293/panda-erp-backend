spring.application.name=parent

# ── DB custom properties ──────────────────────────────────────────
erp.finance.api.db.hostName=${DB_HOST:localhost}
erp.finance.api.db.port=${DB_PORT:5432}
erp.finance.api.db.databaseName=${DB_NAME:erp-system-db}
erp.finance.api.db.schemaName=rm_material_schema
erp.finance.api.db.username=${DB_USERNAME:postgres}
erp.finance.api.db.password=${DB_PASSWORD:Umesh@293}
erp.finance.api.db.connectionpoolInitialSize=2
erp.finance.api.db.connectionpoolMaxSize=5
erp.finance.api.db.connectionpoolMaxWaitTime=1000
erp.finance.api.db.connectionpoolMaxIdleTime=3000
erp.finance.api.db.connectionpoolMaxLifetime=18000

# ── Spring R2DBC ──────────────────────────────────────────────────
spring.r2dbc.url=${DATABASE_URL:r2dbc:postgresql://localhost:5432/erp-system-db?currentSchema=rm_material_schema}
spring.r2dbc.username=${DB_USERNAME:postgres}
spring.r2dbc.password=${DB_PASSWORD:Umesh@293}

# ── JWT ───────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:PandaAquaSecretKey2026!!MustBe32CharLong}
jwt.expiry-hours=12

# ── Logging ───────────────────────────────────────────────────────
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.hst=WARN
logging.level.org.springframework.r2dbc=WARN

# ── Error handling ────────────────────────────────────────────────
server.error.include-message=always
server.error.include-binding-errors=always